version: '3.8'

# Secrets come from a root .env (see .env.example). No hardcoded credentials.
# Required: POSTGRES_PASSWORD, JWT_SECRET, KMS_DATA_KEY. Compose fails without them.

services:
  postgres:
    image: postgres:15
    container_name: pulsepay_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulsepay_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?set in .env}
      KMS_DATA_KEY: ${KMS_DATA_KEY:?set in .env (64 hex chars)}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-test_sid}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-test_token}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-+910000000000}
      CV_SERVICE_URL: http://cv-service:8000
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.86}
      DISTRESS_CAP_PAISE: ${DISTRESS_CAP_PAISE:-50000}
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => { r.statusCode === 200 ? process.exit(0) : process.exit(1) }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: npm start

  # India-resident CV / inference plane. No public ingress in production (private subnet).
  cv-service:
    build:
      context: ./cv-service
      dockerfile: Dockerfile
    container_name: pulsepay_cv_service
    environment:
      BACKEND_URL: http://backend:5000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LIVENESS_THRESHOLD: "0.5"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulsepay_frontend
    environment:
      # The browser talks to host-mapped ports; localhost defaults in lib/api.ts also work.
      VITE_API_URL: http://localhost:5000
      VITE_CV_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      cv-service:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
