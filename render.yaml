services:
  - type: web
    name: pulsepay-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: AWS_REGION
        value: us-east-1

  - type: web
    name: pulsepay-cv-service
    runtime: python
    rootDir: cv-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AWS_REGION
        value: us-east-1
